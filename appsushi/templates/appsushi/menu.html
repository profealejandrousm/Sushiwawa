{% extends "appsushi/base.html" %}
{% load static %}


{% block contenido %}
<div class="container">

    <div class="row mt-3">
       

            {% for producto in productos %}
             <div class="col-lg-4">
            <div class="card p-2 shadow rounded">

                <img class="card-img-top" src='{% static "appsushi/img/electrica.jfif" %}' alt="Card image">
                
                <div class="card-body">
                    <h4 class="card-title">{{producto.nombre_producto}}</h4>
                    <p class="card-text">{{producto.descripcion}}</p>
                    <p>${{producto.precio}}</p>
                    <a href="#" class="btn btn-danger">Ver detalles</a>
                </div>
            </div>
            </div>
            {% endfor %}
        
</div>
{% endblock contenido %}
